name: sjcem_navigator
description: SJCEM Navigator - Indoor Navigation and Academic Management System
publish_to: 'none'
version: 2.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  sensors_plus: ^4.0.2
  pedometer: ^4.0.1
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  flutter_compass: ^0.8.0
  image: ^4.1.3
  path_provider: ^2.1.2
  uuid: ^4.2.2
  flutter_svg: ^2.0.9
  file_picker: ^8.0.0
  url_launcher: ^6.2.2
  dio: ^5.4.0
  permission_handler: ^11.3.0
  # Local Notifications (using Supabase Realtime for triggers)
  flutter_local_notifications: ^17.2.2
  # App performance
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/maps/
    - assets/icons/

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#1a1a2e"
  image: assets/icons/splash_logo.png
  color_dark: "#0f0f1a"
  image_dark: assets/icons/splash_logo.png
  android_12:
    color: "#1a1a2e"
    icon_background_color: "#1a1a2e"
    image: assets/icons/splash_logo.png
  ios: true
  android: true

# App Launcher Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
