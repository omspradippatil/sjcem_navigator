name: Push Notifications via Direct FCM

# Runs every 5 minutes — queries Supabase for new events and sends
# Firebase Cloud Messaging (FCM) push notifications directly via HTTP v1 API.

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:         # Allow manual trigger from Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Google Auth Library
        run: pip install google-auth requests
        
      - name: Send push notifications for new events
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "SUPABASE_URL set: $([ -n "$SUPABASE_URL" ] && echo YES || echo NO)"
          echo "SUPABASE_KEY set: $([ -n "$SUPABASE_KEY" ] && echo YES || echo NO)"
          echo "FCM_SERVICE_ACCOUNT set: $([ -n "$FCM_SERVICE_ACCOUNT_JSON" ] && echo YES || echo NO)"

          if [ -z "$FCM_SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ Error: FCM_SERVICE_ACCOUNT_JSON secret is missing."
            exit 1
          fi

          # Extract project ID from the JSON
          PROJECT_ID=$(echo "$FCM_SERVICE_ACCOUNT_JSON" | python -c "import sys, json; print(json.load(sys.stdin).get('project_id', ''))")
          if [ -z "$PROJECT_ID" ]; then
            echo "❌ Error: Could not determine Firebase project_id from service account json."
            exit 1
          fi
          echo "Firebase Project ID: $PROJECT_ID"

          # ─── 1. Get Google OAuth2 Token ────────────────────────────────────
          # We need an ephemeral Bearer token to talk to the FCM v1 HTTP API
          cat << 'EOF' > get_token.py
          import sys, json, requests
          import google.auth.transport.requests
          from google.oauth2 import service_account

          try:
              cred_json = json.loads(sys.argv[1])
              cred = service_account.Credentials.from_service_account_info(
                  cred_json,
                  scopes=['https://www.googleapis.com/auth/firebase.messaging']
              )
              auth_req = google.auth.transport.requests.Request()
              cred.refresh(auth_req)
              print(cred.token)
          except Exception as e:
              print(f"Error getting token: {e}", file=sys.stderr)
              sys.exit(1)
          EOF

          FCM_TOKEN=$(python get_token.py "$FCM_SERVICE_ACCOUNT_JSON")
          if [ -z "$FCM_TOKEN" ]; then
            echo "❌ Failed to generate FCM OAuth2 token."
            exit 1
          fi
          echo "✅ Successfully generated FCM OAuth2 Bearer token."

          # ─── Helpers ───────────────────────────────────────────────────────
          # Send a single push via FCM v1 to a list of tokens separately
          send_push() {
            local title="$1"
            local body="$2"
            local tokens="$3"

            if [ "$tokens" = "[]" ] || [ -z "$tokens" ]; then
              echo "  ⚠️  No devices to notify, skipping"
              return
            fi

            echo "$tokens" | python -c "
          import sys, json, os, urllib.request
          try:
              tokens = json.load(sys.stdin)
              project_id = os.environ['PROJECT_ID']
              fcm_auth_token = os.environ['FCM_TOKEN']
              title = sys.argv[1]
              body = sys.argv[2]
              
              url = f'https://fcm.googleapis.com/v1/projects/{project_id}/messages:send'
              headers = {
                  'Authorization': f'Bearer {fcm_auth_token}',
                  'Content-Type': 'application/json'
              }
              
              success = 0
              for token in tokens:
                  payload = {
                      'message': {
                          'token': token,
                          'notification': {
                              'title': title,
                              'body': body
                          },
                          'android': {
                              'priority': 'HIGH',
                              'notification': {
                                  'sound': 'default',
                                  'channel_id': 'general_notifications'
                              }
                          }
                      }
                  }
                  
                  req = urllib.request.Request(url, data=json.dumps(payload).encode('utf-8'), headers=headers, method='POST')
                  try:
                      with urllib.request.urlopen(req) as response:
                          if response.status == 200:
                              success += 1
                  except Exception as e:
                      print(f'  ❌ FCM send error for a token: {e}')
              
              print(f'  📲 Successfully sent FCM push to {success}/{len(tokens)} device(s)')
          except Exception as e:
              print(f'  ❌ Script error: {e}')
          " "$title" "$body"
          }

          # Fetch player_ids for a specific branch
          get_branch_tokens() {
            local branch_id="$1"
            curl -s \
              "$SUPABASE_URL/rest/v1/device_tokens?branch_id=eq.$branch_id&select=player_id" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Prefer: return=representation" \
              | python -c "
          import sys, json
          try:
              rows = json.load(sys.stdin)
              ids = [r['player_id'] for r in rows if r.get('player_id')]
              print(json.dumps(ids))
          except Exception as e:
              print('[]')
          "
          }

          # Fetch ALL player_ids
          get_all_tokens() {
            curl -s \
              "$SUPABASE_URL/rest/v1/device_tokens?select=player_id" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Prefer: return=representation" \
              | python -c "
          import sys, json
          try:
              rows = json.load(sys.stdin)
              ids = [r['player_id'] for r in rows if r.get('player_id')]
              print(json.dumps(ids))
          except:
              print('[]')
          "
          }

          # ─── Window: last 6 minutes ─────────────────────────────────────────
          SINCE=$(date -u -d '6 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Checking for new events since: $SINCE"

          # ═══════════════════════════════════════════════════════════════════
          # 1. NEW CHAT MESSAGES
          # ═══════════════════════════════════════════════════════════════════
          echo ""
          echo "📨 Checking new chat messages..."

          NEW_MESSAGES=$(curl -s \
            "$SUPABASE_URL/rest/v1/branch_chat_messages?created_at=gte.$SINCE&is_deleted=eq.false&select=id,branch_id,anonymous_name,message" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          MSG_COUNT=$(echo "$NEW_MESSAGES" | python -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
          echo "  Found: $MSG_COUNT new message(s)"

          if [ "$MSG_COUNT" -gt 0 ]; then
            echo "$NEW_MESSAGES" | python -c "
          import sys, json, collections
          msgs = json.load(sys.stdin)
          by_branch = collections.defaultdict(list)
          for m in msgs:
              by_branch[m['branch_id']].append(m)
          for branch_id, ms in by_branch.items():
              last = ms[-1]
              sender = last.get('anonymous_name', 'Someone')
              msg = last.get('message', '')[:80]
              extra = f' (+{len(ms)-1} more)' if len(ms) > 1 else ''
              print(f'{branch_id}|{sender}{extra}|{msg}')
          " | while IFS='|' read -r branch_id sender body; do
              echo "  Branch: $branch_id — $sender"
              TOKENS=$(get_branch_tokens "$branch_id")
              send_push "💬 $sender" "$body" "$TOKENS"
            done
          fi

          # ═══════════════════════════════════════════════════════════════════
          # 2. NEW STUDY FILES
          # ═══════════════════════════════════════════════════════════════════
          echo ""
          echo "📚 Checking new study files..."

          NEW_FILES=$(curl -s \
            "$SUPABASE_URL/rest/v1/study_files?created_at=gte.$SINCE&is_active=eq.true&select=id,name,folder_id,uploaded_by" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          FILE_COUNT=$(echo "$NEW_FILES" | python -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
          echo "  Found: $FILE_COUNT new file(s)"

          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "$NEW_FILES" | python -c "
          import sys, json
          files = json.load(sys.stdin)
          for f in files:
              print(f\"{f['folder_id']}|{f['name']}\")
          " | while IFS='|' read -r folder_id file_name; do
              FOLDER_INFO=$(curl -s \
                "$SUPABASE_URL/rest/v1/study_folders?id=eq.$folder_id&select=branch_id,name" \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY")
              BRANCH_ID=$(echo "$FOLDER_INFO" | python -c "
          import sys, json
          rows = json.load(sys.stdin)
          print(rows[0]['branch_id'] if rows and rows[0].get('branch_id') else '')
          " 2>/dev/null)

              if [ -n "$BRANCH_ID" ]; then
                TOKENS=$(get_branch_tokens "$BRANCH_ID")
                send_push "📚 New Study Material" "$file_name has been uploaded" "$TOKENS"
              fi
            done
          fi

          # ═══════════════════════════════════════════════════════════════════
          # 3. NEW POLLS
          # ═══════════════════════════════════════════════════════════════════
          echo ""
          echo "📊 Checking new polls..."

          NEW_POLLS=$(curl -s \
            "$SUPABASE_URL/rest/v1/polls?created_at=gte.$SINCE&is_active=eq.true&select=id,title,branch_id,target_all_branches" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          POLL_COUNT=$(echo "$NEW_POLLS" | python -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
          echo "  Found: $POLL_COUNT new poll(s)"

          if [ "$POLL_COUNT" -gt 0 ]; then
            echo "$NEW_POLLS" | python -c "
          import sys, json
          polls = json.load(sys.stdin)
          for p in polls:
              target_all = 'true' if p.get('target_all_branches') else 'false'
              branch = p.get('branch_id') or ''
              print(f\"{p['title']}|{branch}|{target_all}\")
          " | while IFS='|' read -r title branch_id target_all; do
              if [ "$target_all" = "true" ]; then
                TOKENS=$(get_all_tokens)
              else
                TOKENS=$(get_branch_tokens "$branch_id")
              fi
              send_push "📊 New Poll" "$title — tap to vote!" "$TOKENS"
            done
          fi

          echo ""
          echo "✅ Push notification check complete"
